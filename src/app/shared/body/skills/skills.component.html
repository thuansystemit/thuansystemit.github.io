<div class="skills-page">
  <h2 class="section-title">Technical Skills</h2>

  <div class="skill-group" *ngFor="let group of skillGroups">
    <h4 class="group-label">{{ group.label }}</h4>
    <ul class="skill-list">
      <li *ngFor="let item of group.items">{{ item }}</li>
    </ul>
  </div>
</div>
